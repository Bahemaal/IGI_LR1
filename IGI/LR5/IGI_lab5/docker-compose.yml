version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=cosmet_center.settings
      - DJANGO_LOG_LEVEL=INFO
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py loaddata apps/core/fixtures/initial_data.json --ignorenonexistent 2>/dev/null || true &&
             python manage.py runserver 0.0.0.0:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cosmet_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pg_data:
  media_data:
